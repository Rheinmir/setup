# Gác drift 2 cây skill: skills/ (npx publish) PHẢI khớp llmwiki/skills/ (bundle).
# Sửa 1 cây quên cây kia → CI này FAIL, in đúng file lệch + cách sửa.
name: skills-sync
on: [pull_request, push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - name: skills/ ↔ llmwiki/skills/ phải khớp (canonical = skills/)
        run: python3 harness/scripts/sync-skills.py --check
      - name: skill cross-surface (marketplace + AGENT + CLAUDE + LOOP_MAP không drift)
        run: python3 harness/scripts/skill-registry.py --check
