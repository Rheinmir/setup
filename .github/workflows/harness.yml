name: harness

# Sàn đảm bảo của harness — chạy trên MỌI PR và push lên orca, KHÔNG phụ thuộc
# vendor/hook nào (advisory rules bị lờ ở mọi agent non-Claude → CI là nơi nói "không"
# mà không bypass được khi merge). Cả hai job đều gọi CÙNG một lõi llmwiki-validate.py.

on:
  pull_request:
  push:
    branches: [orca]

permissions:
  contents: read

jobs:
  selftest:
    name: self-test lõi (demo 13 + broad 54 = 67 assertion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: demo.sh (13 assertion)
        run: bash harness/poc-vendor-neutral/demo.sh
      - name: test-broad.sh (54 assertion)
        run: bash harness/poc-vendor-neutral/test-broad.sh

  validate-content:
    name: validate file .md đổi (layer=repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: harness validator trên file .md thay đổi
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # base có thể rỗng / không tồn tại (push đầu, force) → lùi về HEAD~1
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          files=$(git diff --name-only "$base" HEAD | grep -E '\.md$' || true)
          if [ -z "$files" ]; then echo "không có .md đổi — bỏ qua"; exit 0; fi
          echo "kiểm tra:"; echo "$files" | sed 's/^/  /'
          # shellcheck disable=SC2086
          python3 harness/poc-vendor-neutral/bin/llmwiki-validate.py files $files

  repo-health:
    name: repo health (fresh-clone gates — trước nay chỉ pre-commit, bypass được)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      # Các validator này trước nay CHỈ chạy pre-commit (bypass bằng --no-verify / không cài).
      # Nay git-aware (bỏ qua draft/html gitignored) nên chạy được trên checkout sạch của CI.
      - name: R3 index-sync (git-aware) — framework wiki (fdk/wiki) + demo template (llmwiki/wiki)
        run: |
          python3 harness/validators/index_sync.py --wiki-dir fdk/wiki
          python3 harness/validators/index_sync.py --wiki-dir llmwiki/wiki
      - name: L4 wiki-health — broken wikilink (git-aware)
        run: python3 harness/scripts/wiki-health.py --wiki-dir fdk/wiki --fail-on broken
      - name: arch-scan — doc vs rule
        run: python3 harness/scripts/arch-scan.py --root .
      - name: harness-lint — meta-drift (hằng số content-dir + wiring policy→settings)
        run: python3 harness/scripts/harness-lint.py --check
      - name: agent↔claude skill-table parity
        run: python3 harness/validators/agent_claude_parity.py
      - name: duplicate-basename — slug wiki không trùng giữa các thư mục
        run: python3 harness/validators/duplicate_basename.py --wiki-dir fdk/wiki
      - name: ADR first-class trong khuôn per-project (skeleton + functional)
        run: bash harness/tests/adr-normal-user-test.sh .
      - name: harness-doctor — fire-drill (mọi rail còn cắn?)
        run: python3 harness/scripts/harness-doctor.py --ci
      - name: capabilities current (fdk/CAPABILITIES.md khớp đĩa)
        run: python3 fdk/tools/build-capabilities.py --check
      - name: adapt-registry leak-gate (ẩn số quarantine không rò — BNAL Step 7)
        run: python3 harness/scripts/adapt-registry.py --check
