# L2 REPO BACKSTOP — vendor-neutral: agent/CLI nào commit cũng bị gate.
# Cài: pipx install pre-commit && pre-commit install
# Lưu ý: file này nằm ở repo root (pre-commit yêu cầu). Khi deploy llmwiki vào
# project khác, copy sang root của project đó và sửa prefix đường dẫn (xem harness/recipe.md).
repos:
  - repo: local
    hooks:
      - id: wiki-origin-required
        name: "R2: wiki file phai co '## Origin'"
        entry: python harness/validators/origin_required.py
        language: system
        files: ^llmwiki/wiki/(concepts|entities|sources|draft)/.*\.md$

      - id: wiki-okf-frontmatter
        name: "R9: wiki concept co YAML frontmatter + type (OKF v0.1)"
        entry: python harness/validators/okf_frontmatter.py
        language: system
        files: ^llmwiki/wiki/(concepts|entities|sources|draft|architecture|tours)/.*\.md$

      - id: wiki-folder-structure
        name: "R5: file wiki dung subfolder"
        entry: python harness/validators/folder_structure.py
        language: system
        files: ^llmwiki/wiki/.*\.md$

      - id: wiki-proposal-complete
        name: "R7: proposal cho duyet phai co Agent table + seq per-task"
        entry: python harness/validators/proposal_complete.py
        language: system
        files: ^llmwiki/wiki/(draft|sources/draft)/.*\.md$

      - id: arch-scan
        name: "arch-scan: van ban skill/doc khop luat R1-R7"
        entry: python harness/scripts/arch-scan.py --root .
        language: system
        always_run: true
        pass_filenames: false

      - id: wiki-index-sync
        name: "R3: index.md khop tap file wiki"
        entry: python harness/validators/index_sync.py --wiki-dir llmwiki/wiki
        language: system
        always_run: true
        pass_filenames: false

      - id: wiki-health
        name: "L4: wiki health (broken wikilink = fail)"
        entry: python harness/scripts/wiki-health.py --wiki-dir llmwiki/wiki --fail-on broken
        language: system
        always_run: true
        pass_filenames: false

      - id: policy-converters-drift
        name: "T5: drift gen-converters <-> policy.yaml (adapter khop rule)"
        entry: bash harness/tests/policy-converters-drift-test.sh
        language: system
        always_run: true
        pass_filenames: false

      - id: harness-pull-gate
        name: "R12 gate2: pull-before-push (chan push neu local SAU remote)"
        entry: bash harness/poc-vendor-neutral/bin/pull-gate.sh gate2
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

