# L2 REPO BACKSTOP — vendor-neutral: agent/CLI nào commit cũng bị gate.
# Cài: pipx install pre-commit && pre-commit install
# Lưu ý: file này nằm ở repo root (pre-commit yêu cầu). Khi deploy llmwiki vào
# project khác, copy sang root của project đó và sửa prefix đường dẫn (xem harness/recipe.md).
repos:
  - repo: local
    hooks:
      - id: wiki-origin-required
        name: "R2: wiki file phai co '## Origin'"
        entry: python3 harness/validators/origin_required.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(concepts|entities|sources|draft)/.*\.md$

      - id: wiki-okf-frontmatter
        name: "R9: wiki concept co YAML frontmatter + type (OKF v0.1)"
        entry: python3 harness/validators/okf_frontmatter.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(concepts|entities|sources|draft|architecture|tours)/.*\.md$

      - id: wiki-folder-structure
        name: "R5: file wiki dung subfolder"
        entry: python3 harness/validators/folder_structure.py
        language: system
        files: ^(fdk|llmwiki)/wiki/.*\.md$

      - id: wiki-proposal-complete
        name: "R7: proposal cho duyet phai co Agent table + seq per-task"
        entry: python3 harness/validators/proposal_complete.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(draft|sources/draft)/.*\.md$

      - id: arch-scan
        name: "arch-scan: van ban skill/doc khop luat R1-R7"
        entry: python3 harness/scripts/arch-scan.py --root .
        language: system
        always_run: true
        pass_filenames: false

      - id: wiki-index-sync
        name: "R3: index.md khop tap file wiki"
        entry: python3 harness/validators/index_sync.py --wiki-dir fdk/wiki
        language: system
        always_run: true
        pass_filenames: false

      - id: wiki-health
        name: "L4: wiki health (broken wikilink = fail)"
        entry: python3 harness/scripts/wiki-health.py --wiki-dir fdk/wiki --fail-on broken
        language: system
        always_run: true
        pass_filenames: false

      - id: harness-lint
        name: "meta-drift: hằng số content-dir + wiring policy→settings"
        entry: python3 harness/scripts/harness-lint.py --check
        language: system
        always_run: true
        pass_filenames: false

      - id: agent-claude-parity
        name: "AGENT.md ↔ CLAUDE.md bảng skill phải khớp"
        entry: python3 harness/validators/agent_claude_parity.py
        language: system
        files: ^llmwiki/(AGENT|CLAUDE)\.md$

      - id: wiki-duplicate-basename
        name: "không có basename .md trùng ở ≥2 thư mục wiki/ (diverging-dup guard)"
        entry: python3 harness/validators/duplicate_basename.py --wiki-dir fdk/wiki
        language: system
        always_run: true
        pass_filenames: false

      - id: adr-normal-user
        name: "ADR first-class trong khuôn per-project (skeleton + functional)"
        entry: bash harness/tests/adr-normal-user-test.sh .
        language: system
        always_run: true
        pass_filenames: false

      - id: auto-index-grounding
        name: "auto-index khi wiki đổi + force-query grounding khi propose"
        entry: bash harness/tests/auto-index-and-grounding-test.sh .
        language: system
        always_run: true
        pass_filenames: false

      - id: decision-adr-link
        name: "R13: quyết định architecture trong decisions.md phải ref ADR"
        entry: python3 harness/validators/decision_adr.py
        language: system
        files: 'decisions\.md$'

      - id: adr-delete-guard
        name: "R13: xóa ADR chỉ khi đã bị đè (Superseded by / supersedes)"
        entry: python3 harness/validators/decision_adr.py --guard-deletions
        language: system
        always_run: true
        pass_filenames: false

      - id: decision-adr-gate-test
        name: "R13 gate self-test (decision→ADR + edit/delete-when-superseded)"
        entry: bash harness/tests/decision-adr-gate-test.sh .
        language: system
        always_run: true
        pass_filenames: false

      - id: capabilities-current
        name: "fdk/CAPABILITIES.md khớp đĩa (agent biết đúng đồ nghề)"
        entry: python3 fdk/tools/build-capabilities.py --check
        language: system
        always_run: true
        pass_filenames: false

      - id: adapt-registry-leak
        name: "adapt-registry: ẩn số quarantine không rò qua adapter (BNAL Step 7)"
        entry: python3 harness/scripts/adapt-registry.py --check
        language: system
        always_run: true
        pass_filenames: false

      - id: seq-html-glass
        name: "R11: seq html phai glass docs-site-macos (repo-tier)"
        entry: python3 harness/poc-vendor-neutral/bin/llmwiki-validate.py files
        language: system
        files: '.*-seq\.html$'

      - id: policy-converters-drift
        name: "T5: drift gen-converters <-> policy.yaml (adapter khop rule)"
        entry: bash harness/tests/policy-converters-drift-test.sh
        language: system
        always_run: true
        pass_filenames: false

      - id: harness-pull-gate
        name: "R12 gate2: pull-before-push (chan push neu local SAU remote)"
        entry: bash harness/poc-vendor-neutral/bin/pull-gate.sh gate2
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: fdk-gate
        name: "FDK gate: đủ step định-nghĩa-hoàn-thành mới cho push"
        entry: python3 harness/scripts/fdk-gate.py
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: harness-local
        name: "harness-local: rule RIÊNG của dự án (P-namespace, sync-safe)"
        entry: bash -c 'test -f harness-local/run.py && python3 harness-local/run.py files "$@" || true' --
        language: system
        pass_filenames: true

      - id: harness-local-check
        name: "harness-local: self-test (id P<n> không đụng R + validator compile)"
        entry: bash -c 'test -f harness-local/run.py && python3 harness-local/run.py check || true'
        language: system
        always_run: true
        pass_filenames: false

      - id: audit-reconcile
        name: "Tru 5: quy actor agent/nguoi vao audit chain tai chot git (fail-open)"
        entry: bash -c 'python3 harness/scripts/code-logger.py --reconcile "$@" || true' --
        language: system
        files: '^(llmwiki/|harness/|skills/|fdk/|\.github/)'
        pass_filenames: true

  # Tùy chọn — bật khi đã cài binary (brew install lychee):
