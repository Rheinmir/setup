# L2 REPO BACKSTOP — vendor-neutral: agent/CLI nào commit cũng bị gate.
# Cài: pipx install pre-commit && pre-commit install
# Lưu ý: file này nằm ở repo root (pre-commit yêu cầu). Khi deploy llmwiki vào
# project khác, copy sang root của project đó và sửa prefix đường dẫn (xem harness/recipe.md).
#
# NGUYÊN TẮC TẦNG (issue #18, concept [[harness-enforcement-floor]]): CI (L4) mới là SÀN THẬT —
# nó đã chạy TRỌN bộ fire-drill 17-rule (job "repo health" trong .github/workflows/harness.yml).
# Nên L2 pre-commit CHỈ là tiện-nghi-chặn-sớm: chạy content-validator NHANH trên FILE ĐỔI, KHÔNG
# nhân bản cả CI ở mỗi commit. Trước đây 25 hook (nhiều cái always_run + bash self-test) chạy mỗi
# commit → stash toàn worktree + spawn 25 interpreter → >2 phút, dễ timeout, kill giữa chừng để
# lại index hỏng. Bộ fire-drill đầy đủ đã dời hẳn sang CI + `medic --ci` (không mất độ phủ).
#
# NẾU commit bị KILL giữa chừng và git status báo hàng loạt "D" (deletion) ảo dù file vẫn còn:
# đó là stash-patch của pre-commit chưa trả lại. Cứu (KHÔNG mất việc): bản sao nằm ở
# ~/.cache/pre-commit/patch*  →  `git reset` (index về HEAD, không đụng file) rồi
# `git stash list` / `git apply ~/.cache/pre-commit/patch<...>` để phục hồi thay đổi chưa-staged.
repos:
  - repo: local
    hooks:
      # ── L2 = content-validator theo FILE ĐỔI (nhanh, giây) ──────────────────────────────
      - id: wiki-origin-required
        name: "R2: wiki file phai co '## Origin'"
        entry: python3 harness/validators/origin_required.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(concepts|entities|sources|draft)/.*\.md$

      - id: wiki-okf-frontmatter
        name: "R9: wiki concept co YAML frontmatter + type (OKF v0.1)"
        entry: python3 harness/validators/okf_frontmatter.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(concepts|entities|sources|draft|architecture|tours)/.*\.md$

      - id: wiki-folder-structure
        name: "R5: file wiki dung subfolder"
        entry: python3 harness/validators/folder_structure.py
        language: system
        files: ^(fdk|llmwiki)/wiki/.*\.md$

      - id: wiki-proposal-complete
        name: "R7: proposal cho duyet phai co Agent table + seq per-task"
        entry: python3 harness/validators/proposal_complete.py
        language: system
        files: ^(fdk|llmwiki)/wiki/(draft|sources/draft)/.*\.md$

      - id: agent-claude-parity
        name: "AGENT.md ↔ CLAUDE.md bảng skill phải khớp"
        entry: python3 harness/validators/agent_claude_parity.py
        language: system
        files: ^llmwiki/(AGENT|CLAUDE)\.md$

      - id: decision-adr-link
        name: "R13: quyết định architecture trong decisions.md phải ref ADR"
        entry: python3 harness/validators/decision_adr.py
        language: system
        files: 'decisions\.md$'

      - id: seq-html-glass
        name: "R11: seq html phai glass docs-site-macos (repo-tier)"
        entry: python3 harness/poc-vendor-neutral/bin/llmwiki-validate.py files
        language: system
        files: '.*-seq\.html$'

      - id: harness-local
        name: "harness-local: rule RIÊNG của dự án (P-namespace, sync-safe)"
        entry: bash -c 'test -f harness-local/run.py && python3 harness-local/run.py files "$@" || true' --
        language: system
        pass_filenames: true

      - id: audit-reconcile
        name: "Tru 5: quy actor agent/nguoi vao audit chain tai chot git (fail-open)"
        entry: bash -c 'python3 harness/scripts/code-logger.py --reconcile "$@" || true' --
        language: system
        files: '^(llmwiki/|harness/|skills/|fdk/|\.github/)'
        pass_filenames: true

      # ── commit-msg stage (nhanh, bắt buộc) ──────────────────────────────────────────────
      - id: no-ai-attribution
        name: "R15: commit message khong duoc ghi cong AI (Co-Authored-By/Generated-with/robot)"
        entry: python3 harness/validators/no_ai_attribution.py --commit-msg
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: true

      # ── pre-push stage (chỉ khi push, không phải mỗi commit) ─────────────────────────────
      - id: harness-pull-gate
        name: "R12 gate2: pull-before-push (chan push neu local SAU remote)"
        entry: bash harness/poc-vendor-neutral/bin/pull-gate.sh gate2
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: fdk-gate
        name: "FDK gate: đủ step định-nghĩa-hoàn-thành mới cho push"
        entry: python3 harness/scripts/fdk-gate.py
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false

# ── ĐÃ DỜI SANG CI (job "repo health" trong .github/workflows/harness.yml) + `medic --ci` ──
#   Bộ fire-drill đầy đủ KHÔNG chạy mỗi commit nữa (issue #18) — CI là sàn đảm bảo:
#     arch-scan · R3 index-sync · L4 wiki-health · meta-drift(harness-lint) · duplicate-basename
#     · ADR-normal-user · auto-index+grounding · R13 gate self-test · adr-delete-guard
#     · capabilities-current · adapt-registry-leak · policy-converters-drift · harness-local-check
#     · harness-doctor --ci (fire-drill mọi rail)
#   Muốn chạy TẤT CẢ tại máy trước khi push: `python3 fdk/tools/medic.py` (cổng sức khoẻ tổng).
#
# Tùy chọn — bật khi đã cài binary (brew install lychee):
# - repo: local
#   hooks:
#     - id: lychee-offline
#       name: "link check offline"
#       entry: lychee --offline --no-progress llmwiki/wiki
#       language: system
#       pass_filenames: false
