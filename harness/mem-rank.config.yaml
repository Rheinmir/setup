# harness/mem-rank.config.yaml
# THE single place the MemRank unknowns live — the /build-now-adapt-later quarantine.
# mem-rank.py reads its relevance scorer + eviction policy FROM HERE. Trend mirrored (2026):
# agent memory as production infra (Mem0/Zep/Letta) — ADD/UPDATE/DELETE/NOOP ops + ranked
# retrieval that returns the few relevant memories instead of dumping full context.
#
# The store, the 4 ops, and BOTH rankers are built + self-tested now:
#   - token-overlap (Jaccard, lexical): zero-dep DEFAULT, works offline everywhere.
#   - embedding (cosine over `embedder_cmd`): REAL semantic path — code exists + tested; it needs
#     an embedding backend, which a travel-able framework can't bundle, so the backend is pluggable.
# Only the model WEIGHTS come from the environment — the wiring is no longer a null stub.

verified: false                   # token-overlap default is deterministic + tested; flip true once an embedder_cmd is wired + calibrated on real load.

relevance:
  scorer: token-overlap           # 'token-overlap' (Jaccard, offline default) | 'embedding' (semantic, needs embedder_cmd below)
  # embedder_cmd: reads text on STDIN, prints a JSON float array on STDOUT. Any backend works:
  #   Ollama : 'python3 harness/scripts/embed-ollama.py'   (nomic-embed-text, offline, no key)
  #   Voyage : 'python3 harness/scripts/embed-voyage.py'   (needs VOYAGE_API_KEY, network)
  # Set scorer: embedding AND embedder_cmd to turn on semantic recall; unreachable => auto-fallback.
  embedder_cmd: null              # null => token-overlap (semantic path off)
  min_score: 0.25                 # embedding only: cosine floor for NOOP (cosine>0 even for unrelated)

eviction:
  policy: score                   # score | lru | none; evict lowest-relevance when over cap
  max_entries: 500                # tune to real memory volume

# ADAPT-CHECKLIST (turn on semantic recall):
#   1. Point relevance.embedder_cmd at a backend (STDIN text -> STDOUT JSON float array) + set scorer: embedding.
#   2. Calibrate relevance.min_score + eviction on real memory volume.
#   3. Run: python3 harness/scripts/mem-rank.py --self-test  (must PASS).
#   4. Flip verified:true. Only then trust ranked retrieval for production recall.
