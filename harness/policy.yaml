# L0 POLICY — bất biến của llmwiki, thuần khai báo, không dính vendor.
# Mỗi rule có validator tương ứng trong harness/validators/ (cùng id).
# Enforcement point: session = L1 adapter (hook theo vendor), repo = L2 (pre-commit).

rules:
  - id: R1
    name: no-write-raw
    validator: no_write_raw.py
    statement: "Agent không bao giờ ghi vào raw/ — raw/ là inbox của con người."
    enforce_at: [session]        # KHÔNG enforce ở repo: con người commit file raw/ là hợp lệ
    applies_to: [write, bash]

  - id: R2
    name: origin-required
    validator: origin_required.py
    statement: "Mọi wiki file phải có section '## Origin' — luôn truy được nguồn gốc."
    enforce_at: [session, repo]
    applies_to: [write]
    scope: "wiki/(concepts|entities|sources|draft)/**/*.md trừ README.md, _template.md"

  - id: R3
    name: index-sync
    validator: index_sync.py
    statement: "wiki/index.md phải liệt kê đúng tập file wiki đang tồn tại."
    enforce_at: [session-stop, repo]
    applies_to: [stop]

  - id: R4
    name: log-append
    validator: null              # thỏa mãn bằng tự động hóa L3 (audit hook tự sinh log)
    statement: "Mọi thao tác đều được ghi log — bằng máy, không nhờ model nhớ."
    enforce_at: [session]
    note: "Hook PostToolUse/Stop/SessionEnd append .claude/audit/*.jsonl; log.md sinh từ đó."

  - id: R5
    name: folder-structure
    validator: folder_structure.py
    statement: "File wiki chỉ nằm trong concepts/, entities/, sources/, draft/ — không ở wiki/ root."
    enforce_at: [session, repo]
    applies_to: [write]
    allow_root_files: [index.md, log.md, README.md, active-context.md, decisions.md]

  - id: R6
    name: verify-before-commit
    validator: null              # enforce bằng chính pre-commit framework (L2)
    statement: "Mọi commit phải qua gate: validators + lint. Fail = không commit được."
    enforce_at: [repo]

  - id: R7
    name: proposal-complete
    validator: proposal_complete.py
    statement: "Bộ ba của một feature phải đủ chất: SPEC chờ duyệt khai ai/CLI làm task nào + sequence diagram TỪNG task + ràng buộc bao trùm; PLAN thi hành khai đường dẫn file chính xác + Interfaces + code từng bước. Không bên nào được còn placeholder."
    enforce_at: [session, repo]
    applies_to: [write]
    scope: "wiki draft .md CÓ '## Plan' và Status còn 'proposed' (output-report và draft đã implemented tự miễn). Tên file kết thúc '-PLAN.md' → nhánh PLAN (miễn diagram: PLAN là thứ MÁY đọc, HTML gắn với SPEC cho NGƯỜI xem lúc duyệt)."
    conditions:
      # nhánh SPEC (do /propose sinh)
      - "Bảng '## Agent Task Assignment' ≥1 row, không ô Agent nào trống"
      - "Link '**Sequence diagram**' trỏ file .html tồn tại trên disk"
      - "Số <div class=\"diagram-box\"> trong html ≥ số task '- [ ]' trong Plan"
      - "'## Global constraints' có nội dung — ràng buộc bao trùm, mỗi task ngầm mang theo khi dispatch"
      - "KHÔNG còn '[CẦN LÀM RÕ: …]' chưa trả lời — model tự điền mặc định thì tag '(default)', nhưng nhóm auth/dữ-liệu/tiền/pháp-lý/ranh-giới-tin-cậy phải hỏi thật trước khi ra cổng duyệt"
      # nhánh PLAN (do /plan sinh — thứ bơm thẳng vào agent context=0)
      - "Mỗi '### Task' có '**Files:**' với đường dẫn thật + ≥1 khối code"
      - "PLAN ≥2 task → mỗi task bắt buộc '**Interfaces:**' (Consumes/Produces) — agent chỉ thấy task của nó"
      - "Cấm placeholder (TBD/TODO/'xử lý lỗi phù hợp'/'tương tự Task N') ở cả SPEC lẫn PLAN; tài liệu NÓI VỀ luật khai 'r7_meta: true' để miễn"

  - id: R18
    name: plan-executable
    validator: proposal_complete.py          # cùng validator với R7 — nhánh rẽ theo tên file '*-PLAN.md'
    statement: "PLAN thi hành (`*-PLAN.md`) — thứ bơm thẳng vào agent context=0 — phải khai Files chính xác + Interfaces (Consumes/Produces) + code từng bước, và cấm placeholder."
    enforce_at: [session, repo]
    applies_to: [write]
    scope: "wiki draft `*-PLAN.md` có '### Task' (PLAN đã implemented/done tự miễn). KHÔNG cần .html — HTML gắn với SPEC, thứ NGƯỜI xem lúc duyệt."
    conditions:
      - "Mỗi '### Task' có '**Files:**' với đường dẫn thật + ≥1 khối code"
      - "PLAN ≥2 task → mỗi task bắt buộc '**Interfaces:**' — agent chỉ thấy task CỦA NÓ, không khai chữ ký thì 2 agent đặt tên hàm lệch nhau"
      - "'## Global constraints' có nội dung (chép nguyên văn từ SPEC)"
      - "Cấm placeholder (TBD/TODO/'xử lý lỗi phù hợp'/'tương tự Task N'); tài liệu NÓI VỀ luật khai 'r7_meta: true' để miễn"
      - "TRUY VẾT: mọi `FR-xxx` trong `## Requirements` của SPEC anh em phải được ≥1 task nhận qua `**Thoả:**` — bỏ sót là chặn, in đúng id. Không có SPEC anh em → fail-open"
    note: "Bản khai báo downstream (poc policy) chỉ gác ở mức FILE — engine vendor-neutral không diễn tả nổi check per-task. Kiểm từng task + cấm placeholder là đặc quyền của validator Python."

  - id: R8
    name: pattern-sync-health
    validator: null              # L4 eval (harness/scripts/health-check.py), KHÔNG chặn — chỉ báo cáo
    statement: "Bộ pattern chuẩn (.template-manifest.json) phải đủ file, không drift, không tụt hậu remote."
    enforce_at: [session-start]  # SessionStart hook chạy health-check, in cảnh báo nếu lệch
    note: "version.json = fingerprint (version + hash từng pattern). Báo cáo, không gate; sync bằng /sync-template."

  - id: R9
    name: okf-frontmatter
    validator: okf_frontmatter.py
    statement: "Mọi wiki concept phải có YAML frontmatter parse được + trường 'type' không rỗng (chuẩn OKF v0.1)."
    enforce_at: [session, repo]
    applies_to: [write]
    scope: "wiki/(concepts|entities|sources|draft|architecture|tours)/**/*.md trừ README.md, _template.md, index.md, log.md, decisions.md, active-context.md"
    note: "OKF v0.1 — Google Cloud 2026-06-12. Dung thứ khóa lạ (tolerate unknown keys); chỉ gate khi thiếu frontmatter/type. Migrate content cũ: harness/scripts/okf-check.py --migrate."

  - id: R10
    name: docs-gate
    validator: null              # L1 inject (UserPromptSubmit hook), KHÔNG chặn — chỉ nhắc
    statement: "Cứ mỗi N prompt (mặc định 5), nếu N request gần nhất chưa dùng /docs-site-macos hay /orca-workflow thì nhắc bổ sung tài liệu."
    enforce_at: [session]        # UserPromptSubmit hook đếm bằng máy (.claude/audit/.docs-gate.json)
    applies_to: [user-prompt]
    note: "Hook user_prompt_submit.py inject directive vào prompt mốc-N: hỏi user có muốn đánh giá+bổ sung docs cho N prompt vừa rồi; nếu đồng ý → dispatch doc-agent skill docs-site-macos (CLI opencode → agy → claude; subagent không gọi được opencode thì /orchestration). Nhịp đổi bằng env LLMWIKI_DOCS_GATE_EVERY. Báo cáo, không gate."

  - id: R11
    name: seq-html-glass-style
    validator: null              # enforce qua poc llmwiki-validate (conditional_require) + pre-commit seq-html-glass
    statement: "Seq diagram HTML (*-seq.html) phải theo style docs-site-macos liquid-glass — không theme flat tự chế."
    enforce_at: [session, repo]
    applies_to: [write]
    scope: "**/*-seq.html"
    note: "Marker bắt buộc: backdrop-filter + linear-gradient(180deg,#f7fbff…) + edge-highlight inset. Chi tiết kind/marker ở poc-vendor-neutral/policy.yaml."

  - id: R12
    name: pull-before-change
    validator: null              # process-gate: (B) orchestrator sweep + (C) git pre-push — không validator content
    statement: "Pull/check remote trước khi bắt đầu việc (orchestrator sweep) và trước khi push (pre-push hook)."
    enforce_at: [session, repo]
    note: "(B) pull-gate-sweep.sh ở orca-workflow Step 0 (quét mọi subrepo) · (C) .git/hooks/pre-push + .pre-commit pre-push + install-harness --all-subrepos. Đã bỏ per-edit PreToolUse. Lý do ở ADR-002-pull-before-change-gates."

  - id: R13
    name: decision-to-adr
    validator: harness/validators/decision_adr.py
    statement: "Quyết định 'architecture' trong decisions.md phải ref một ADR; ADR cho EDIT tự do; XÓA ADR chỉ khi đã bị đè (Superseded by / supersedes ADR-N)."
    enforce_at: [repo]
    note: "pre-commit decision-adr-link (decisions.md) + adr-delete-guard (always-run) + CI repo-health. Vòng đời ở ADR-010."

  - id: R14
    name: patterns-protected
    validator: patterns_guard.py
    statement: "Kho pattern tham chiếu llmwiki/patterns/ chỉ được sửa KHI user cho phép (env LLMWIKI_PATTERNS_UNLOCK=1) — agent không tự ý sửa kho tham chiếu (raw/ nhưng thấp hơn một bậc)."
    enforce_at: [session]
    applies_to: [write, bash]
    note: "PreToolUse guard; adapter harness/pattern-library.config.yaml (verified:false). Xem ADR-014."

  - id: R15
    name: no-ai-attribution
    validator: no_ai_attribution.py
    statement: "Commit message KHÔNG được ghi công cho AI (Co-Authored-By: Claude…, Generated with Claude Code, 🤖). Author/committer chỉ là danh tính người. Fail-open nếu thiếu file message."
    enforce_at: [repo]
    applies_to: [commit-msg]
    note: "git commit-msg gate — pre-commit stage commit-msg (no-ai-attribution) + CI. Xem ADR-016."

  - id: R16
    name: report-show-path
    validator: report_show_path.py
    statement: "HTML report/visualization dưới llmwiki/html/ (trừ archive/, assets/) phải chứa đường dẫn tuyệt đối của chính nó (footer/titlebar) — người xem biết file nằm đâu để mở lại/sửa."
    enforce_at: [session]
    applies_to: [write]
    note: "PostToolUse nhánh .html (llmwiki/.claude/hooks/post_tool_use.py). Nguồn: feedback 020726 + rule skill fdk."

  - id: R17
    name: problem-tree-flush
    validator: session_end.py
    statement: "SessionEnd: phiên có diff/untracked chạm bề mặt framework mà problem-tree chưa cập nhật → hook tự append node stub pending bằng code thuần (0 token); fallback problem-tree.html cho downstream; fail-open khi không có sổ."
    enforce_at: [session]
    event: SessionEnd
    event_action: session-end
    note: "llmwiki/.claude/hooks/session_end.py::flush_problem_tree. Đích: tắt app bình thường thì cây truy vết vẫn nằm đúng chỗ (feedback 020726)."
