# harness/downstream-contract.yaml
# HỢP ĐỒNG DOWNSTREAM — thứ một dự án CÀI MỚI (fresh install) BẮT BUỘC phải có.
# `harness/scripts/fresh-install-smoke.sh` assert từng dòng; smoke là probe `freshinstall` của
# medic → mọi push qua /fdk & /ship buộc phải xanh.
#
# VÌ SAO TỒN TẠI (bài học 2026-07-11): installer hardcode danh sách file. Có thể dev xong một
# tính năng trong repo framework, test xanh hết, mà installer KHÔNG ship file đó → người dùng
# downstream không hề có. "Xanh trong repo" ≠ "đúng ở downstream".
#
# LUẬT DÙNG: dev một tính năng HƯỚNG DOWNSTREAM? **Thêm vào đây TRƯỚC.** Gate sẽ ĐỎ cho tới khi
# installer thật sự ship được nó. Đó chính là forcing function — không phải nhớ, mà bị chặn.

# File PHẢI tồn tại trong dự án cài mới.
must_exist:
  - harness/poc-vendor-neutral/policy.yaml
  - harness/poc-vendor-neutral/test-broad.sh
  - harness/poc-vendor-neutral/gen-converters.py
  - harness/poc-vendor-neutral/bin/llmwiki-validate.py
  - .claude/settings.json
  - .pre-commit-config.yaml
  - .github/workflows/harness.yml
  - llmwiki/wiki/index.md
  - llmwiki/html/overstack.html

# Lệnh PHẢI chạy xanh trong dự án cài mới (harness cắn thật, không chỉ file có mặt).
must_bite:
  - bash harness/poc-vendor-neutral/test-broad.sh

# Skill PHẢI reachable (global) để dự án mới dùng được ngay.
must_reach_skills:
  - orchestration
  - orca-cli
  - orca-dispatch-reference

# Mọi rule id (R\d+) trong policy.yaml của REPO phải có mặt trong policy.yaml DOWNSTREAM.
# Tự động, không cần bảo trì: thêm rule ở fdk mà không tới được downstream → gate đỏ.
rule_parity: true

# ── NỢ ĐÃ BIẾT (khai thẳng, KHÔNG allowlist ngầm) ─────────────────────────────────────────
# Những thứ dưới đây framework CÓ nhưng installer CHƯA ship xuống downstream. Cố ý chưa đưa vào
# must_exist vì fix thật là "install theo manifest" (GH#51) + "ship engine downstream" (GH#41),
# không phải vá danh sách. Khi hai issue đó xong → chuyển các dòng này lên must_exist.
#   - harness/scripts/*        (council.py, claim-receipts.py, mem-rank.py, fresh-install-smoke.sh …)
#   - CAPABILITIES.md          (llmwiki/CLAUDE.md HỨA downstream có, nhưng fresh install KHÔNG có)
