# harness/web-clone.config.yaml
# THE single place the WebClone unknowns live — the /build-now-adapt-later quarantine.
# web-clone.py reads its engine + options FROM HERE. Trend mirrored (2026): save a FAITHFUL copy
# of a page (UI + resources) as one self-contained HTML — SingleFile CLI (keeps scripts),
# monolith (Rust), HTTrack. Interactive JS behaviour is the imperfect part across all engines.
#
# Inlining a LOCAL page's local resources (CSS/JS/images) into one self-contained file is
# deterministic and built now (--self-test). WHICH engine handles a live URL faithfully — and how
# well it preserves JS INTERACTIONS — is the unknown; default 'builtin' inlines a local page offline.

verified: false                   # ASSUMPTION (not verified) — builtin inlines LOCAL resources only; faithful live-URL capture + JS-interaction preservation need an external engine (single-file CLI / monolith) that may be absent. preserve_interactions is a known imperfection.

engine: builtin                   # ASSUMPTION (not verified) — builtin | singlefile-cli | monolith ; builtin = inline local CSS/JS/img → 1 file (offline)
singlefile_cmd: single-file       # ASSUMPTION (not verified) — CLI name nếu engine=singlefile-cli (npm i -g single-file-cli)
monolith_cmd: monolith            # ASSUMPTION (not verified) — CLI name nếu engine=monolith (cargo install monolith)

embed_images: true                # ASSUMPTION (not verified) — nhúng ảnh local thành data: URI
preserve_interactions: best-effort  # ASSUMPTION (not verified) — best-effort: giữ <script>, nhưng tương tác động phụ thuộc engine (chưa đảm bảo)

# ADAPT-CHECKLIST (finalize khi chọn được engine faithful):
#   1. Cài + chọn engine (single-file CLI giữ script tốt; monolith nhanh) → set engine + *_cmd.
#   2. Kiểm tương tác động trên 1-2 trang thật; ghi mức preserve_interactions thực tế.
#   3. Chạy: python3 harness/scripts/web-clone.py --self-test  (phải PASS).
#   4. Flip verified:true. builtin vẫn là fallback cho trang local/tĩnh.
