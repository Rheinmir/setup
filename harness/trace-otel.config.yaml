# harness/trace-otel.config.yaml
# THE single place the TraceOtel unknowns live — the /build-now-adapt-later quarantine.
# trace-otel.py reads its event->OTel-attribute mapping + regression threshold FROM HERE.
# Trend mirrored (2026): agent observability as a discipline — capture the full decision path
# as OpenTelemetry GenAI spans so a wrong answer at step 10 root-causes to a tool call at step 3.
#
# The span-tree construction, the causal-chain walk, and the golden-trace diff are deterministic
# and built now (--self-test). The OTel GenAI semantic conventions are "largely EXPERIMENTAL as
# of 2026", so the exact attribute NAMES are the quarantined guess.

verified: false                   # ASSUMPTION (not verified) — attribute_map mirrors the EXPERIMENTAL OTel GenAI conventions; names may change. regression.threshold is an un-calibrated guess.

# our audit-event field  ->  OTel GenAI span attribute name (experimental spec -> best guess)
attribute_map:                    # ASSUMPTION (not verified) — names follow draft OTel GenAI conventions
  action: gen_ai.operation.name
  tool: gen_ai.tool.name
  model: gen_ai.request.model
  input_tokens: gen_ai.usage.input_tokens
  output_tokens: gen_ai.usage.output_tokens

span_name_field: action           # ASSUMPTION (not verified) — which event field becomes the span name

regression:
  threshold: 0                    # ASSUMPTION (not verified) — # of span diffs vs golden tolerated before "regression"; 0 = any divergence flags

# ADAPT-CHECKLIST (finalize when OTel GenAI conventions stabilise / real traces exist):
#   1. Reconcile attribute_map with the THEN-current OTel GenAI semantic conventions.
#   2. Capture real traces; calibrate regression.threshold against acceptable run-to-run drift.
#   3. Run: python3 harness/scripts/trace-otel.py --self-test  (must PASS).
#   4. Flip verified:true. Only then trust the emitted spans against a real OTel backend.
