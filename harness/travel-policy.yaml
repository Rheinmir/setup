# ── INSTALL-FLOW (council-036 duyệt, seed42) — global engine + llmwiki-travel + stamp ──
# UX KHÔNG ĐỔI: user vẫn chạy đúng 1 lệnh:
#   cd <repo> && curl -fsSL .../bootstrap.sh | bash
# Lệnh đó TỰ lo (theo thứ tự):
#   1. Harness global chưa cài (check ~/.claude/harness/version.json)? → cài global luôn.
#      Global CŨ hơn remote? → tự update global (CÓ BÁO, backward-compat — KHÔNG mù; blast-radius=mọi repo).
#   2. Ghi llmwiki/.harness-stamp {guarded_by: <template_version>} — TRAVEL trong repo, nguồn chân lý
#      "repo này gác theo vX" (KHÔNG dùng registry global — nó drift + chết khi clone, council-036).
#   3. Travel vào repo: CHỈ llmwiki/ + .overstack.yaml + stamp. Engine KHÔNG copy (dùng global, DRY).
#   4. Guard đổi: `[ -f $CLAUDE_PROJECT_DIR/llmwiki/.harness-stamp ]` (opt-in tường minh, travel)
#      thay cho `[ -d llmwiki ]` cũ.
# BẤT BIẾN (Taleb): session_start so stamp-repo vs global-installed; LỆCH MAJOR → cảnh báo TO
#   (fail-safe, không tự ép chuẩn mới lên repo cũ — stamp = HỢP ĐỒNG).
# Registry global (nếu cần tra "máy này gác repo nào") = CACHE rebuildable từ scan đĩa, KHÔNG nguồn chân lý.
#
# ── ĐIỀU KIỆN PASS (user chốt) ──
# Mỗi lần đổi trạng thái travel / install-flow: curl-update 5 dự án test + verify 5/5 LANDS + CHẠY +
# FAIL-OPEN (đập gãy từng tool → phiên user vẫn sống) + verify ≥1 dự án THẬT (không chỉ synthetic) +
# verify version-skew warn (stamp cũ + global mới → báo, không ép).
