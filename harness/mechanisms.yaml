# mechanisms.yaml — NGUỒN CHÂN LÝ cho "cơ chế runtime tự-gác" + "tuyến bảo trì" của overstack.
#
# Vì sao file này tồn tại (ADR-001 policy-as-source-of-truth, council-025):
#   Trước đây danh sách cơ-chế nằm HARDCODE trong fdk/tools/build-overstack-docs.py (list
#   MECHANISMS) + prose tab "Tự bảo trì" — bản CHÉP TAY đóng băng, drift âm thầm mà
#   "khớp đĩa ✓" không bắt được. Rút ra đây → overstack.html DERIVE (không chép), và medic
#   probe `narrative` CẮN khi một cơ-chế LIVE (live_probe tồn tại) mà vắng khỏi trang.
#
# Hợp đồng self-narration: một mục = một live_probe = một dòng truy được. live_probe là path
# repo-relative PHẢI tồn tại (file/dir) — nếu không tồn tại, medic báo "manifest nói dối".
#
# kind: rule | hook | skill | tool   — loại cơ-chế (chỉ để render nhóm, không đổi logic gác).
# surface: mechanism | maintain      — mục hiện ở list cơ-chế, ở tab Tự-bảo-trì, hoặc cả hai.

version: 1

mechanisms:
  # ── 12 cơ-chế runtime đã có (backfill từ MECHANISMS cũ) ─────────────────────
  - id: orientation
    name: orientation
    kind: hook
    surface: [mechanism]
    desc: "SessionStart in ngắn: nhắc agent query code-index + wiki để định vị nhanh (chống lơ ngơ) — ADR-009"
    live_probe: llmwiki/.claude/hooks/session_start.py

  - id: auto-index
    name: auto-index
    kind: hook
    surface: [mechanism]
    desc: "Stop hook chạy index_sync --fix: thêm file wiki mới → index.md tự khớp; chiều xóa vẫn chặn"
    live_probe: harness/validators/index_sync.py

  - id: force-query
    name: force-query
    kind: rule
    surface: [mechanism]
    desc: "/propose buộc query wiki + có '## Context' trước khi draft, không propose 'mù' (R7-f)"
    live_probe: harness/validators/proposal_complete.py

  - id: code-index
    name: code-index
    kind: tool
    surface: [mechanism]
    desc: "code-graph --watch tự reindex khi code đổi; SessionStart surface để định vị nhanh"
    live_probe: llmwiki/.claude/hooks/session_start.py

  - id: code-logger
    name: code-logger
    kind: hook
    surface: [mechanism]
    desc: "PostToolUse: ghi log thao tác BẰNG CODE vào log.md (block auto, không nhờ agent nhớ)"
    live_probe: harness/scripts/code-logger.py

  - id: health-check
    name: health-check
    kind: tool
    surface: [mechanism, maintain]
    desc: "SessionStart: báo pattern-sync lệch (version local↔remote↔disk) — không chặn"
    live_probe: harness/scripts/health-check.py

  - id: wiki-fdk
    name: "wiki→fdk"
    kind: tool
    surface: [mechanism]
    desc: "wiki RIÊNG của framework ở fdk/wiki (the kit); llmwiki/wiki = khuôn per-project — ADR-008"
    live_probe: fdk/wiki

  - id: harness-lint
    name: harness-lint
    kind: tool
    surface: [mechanism]
    desc: "tự-gác: --scanners (mọi wiki-scanner lọc gitignored) + --copies (bản deployed==master) — ADR-007"
    live_probe: harness/scripts/harness-lint.py

  - id: harness-doctor
    name: harness-doctor
    kind: tool
    surface: [mechanism]
    desc: "chạy fixture sai/đúng qua từng validator — chứng minh rào còn cắn (17/17 rule có bite-test)"
    live_probe: harness/scripts/harness-doctor.py

  - id: fdk-gate
    name: fdk-gate
    kind: tool
    surface: [mechanism]
    desc: "định-nghĩa-hoàn-thành: mọi bước phải xanh mới cho push"
    live_probe: harness/scripts/fdk-gate.py

  - id: harness-local
    name: harness-local
    kind: rule
    surface: [mechanism]
    desc: "dự án TỰ viết rule riêng (harness-local/, id P≠R) chạy song song R1–R17; framework chạy trước (AND) — ADR-011"
    live_probe: harness-local

  - id: docs-gate
    name: "docs-gate 2 trụ"
    kind: rule
    surface: [mechanism]
    desc: "R10 mỗi 5 prompt nhắc CẢ tài liệu (/docs-site-macos) LẪN đánh giá/eval (wikieval) — trụ nào thiếu nhắc nấy"
    live_probe: llmwiki/.claude/hooks/user_prompt_submit.py

  # ── 3 tuyến mới phiên 2026-07-03 (council-025: chúng vắng khỏi trang) ────────
  - id: medic
    name: medic
    kind: skill
    surface: [mechanism, maintain]
    desc: "cổng sức-khoẻ tổng — 1 lệnh chứng minh hệ còn khoẻ (luật cắn/drift/docs/code/eval); tuyến phòng thủ cuối trước commit"
    live_probe: fdk/tools/medic.py

  - id: medic-mirror
    name: "medic gương-soi"
    kind: hook
    surface: [mechanism, maintain]
    desc: "Stop-hook: phiên đụng framework (fdk/harness/skills/llmwiki) tự chạy medic --ci cuối lượt; FAIL thật thì chặn dừng — bắt dark-rail SỚM (T2 milestone v1.0.6)"
    live_probe: llmwiki/.claude/hooks/stop.py

  - id: secondary-memory
    name: "bộ nhớ thứ cấp"
    kind: tool
    surface: [mechanism, maintain]
    desc: "scratch-log (RAW append-only, track git) + memory-map (view) + session-provenance (auto-distill) — bắt sửa/context VỤN, không mất gì, truy được ở phiên sau. AUTO cuối lượt qua Stop-hook (issue #5, council-030): auto-điền why từ git nếu chưa ghi tay → distill → regenerate memory-map.html, không cần agent nhớ gõ"
    live_probe: harness/scripts/scratch-log.py
    proof: harness/tests/memory-map-user-reachability-test.sh

  - id: harness-update
    name: harness-update
    kind: skill
    surface: [maintain]
    desc: "TỰ BẢO TRÌ: cài bản mới + self-heal (backfill Origin/index/OKF) + refresh bản đồ năng lực trong một lệnh"
    live_probe: skills/harness-update/SKILL.md

  - id: code-state
    name: "code-state (tự tường thuật)"
    kind: tool
    surface: [mechanism]
    desc: "overstack tự tường thuật trạng thái code: FACT có [nguồn]+lệnh tái tạo, tách FACT/OPINION (council-advisory); medic probe selfstate gác reproducibility"
    live_probe: fdk/tools/code-state.py
    proof: fdk/tools/medic.py

  - id: skill-usage
    name: "skill-usage (đo tần suất)"
    kind: tool
    surface: [mechanism]
    desc: "đọc transcript phiên → đếm lời gọi Skill-tool theo skill + tuần ISO; xếp hạng dùng nhiều + skill chết + so tuần trước → dashboard weekly-<ISOweek>.html self-contained; local-only, deterministic, không telemetry (GH#8)"
    live_probe: fdk/tools/skill-usage.py

  - id: capsurface
    name: "capsurface (bề mặt năng lực đóng dấu)"
    kind: tool
    surface: [mechanism, maintain]
    desc: "capability-stamp ép bump version khi bề mặt năng lực (skill+rule+engine) đổi mà chưa khai — downstream so sha, lệch thì đỏ, không tự tưởng 'current' mà thật ra đã cũ (p-08)"
    live_probe: harness/scripts/capability-stamp.py

  # ── 4 cơ-chế mới phiên 2026-07-18 (senior-lens grower+maintainer audit: chính chúng
  #    lọt lưới narrative — probe pass vì manifest chưa khai, không phải vì chúng không tồn tại) ──
  - id: capproof
    name: "capproof (bằng chứng còn sống)"
    kind: tool
    surface: [mechanism, maintain]
    desc: "resolver 6 tầng map mỗi năng lực (skill/rule/tool/mech) sang bằng chứng chạy được; medic probe ratchet — nợ tồn chỉ đếm, năng lực MỚI thiếu proof hoặc TỤT mới đỏ; đảo chiều bêu ứng-viên-trùng"
    live_probe: fdk/tools/build-capabilities.py

  - id: ledger-snapshot
    name: "ledger-snapshot (ký ức sống sót mất máy)"
    kind: tool
    surface: [mechanism, maintain]
    desc: "SessionEnd tự gom 30 ledger (flywheel/memory/events/audit/tasks) thành tarball, prune giữ N bản; round-trip+dedupe, loại baseline (regen được); fail-open"
    live_probe: harness/scripts/ledger-snapshot.py

  - id: provenance-scope
    name: "provenance re-verify (scope hẹp)"
    kind: rule
    surface: [mechanism, maintain]
    desc: "medic probe hard-fail CHỈ khi skill NGOÀI (adapt_mode=external-pull) bị sửa lén sau khi pin; skill local-authored đổi hằng ngày không cries-wolf (gap#4 senior-lens)"
    live_probe: fdk/tools/skill-provenance.py

  - id: archetype-tester
    name: "archetype tester (/test)"
    kind: tool
    surface: [mechanism]
    desc: "vai thứ 6 (Cherny 5→6): senior tester thiết kế kịch bản test neo FR/SC + code test qc-* đỏ-trước, khớp lưới qc-regression tất định"
    live_probe: harness/scripts/archetype.py

  # ── decision-anchoring pilot (T-260721-03) — 2 mục đầu tiên có anchor_symbol (neo mức-symbol,
  #    cạnh live_probe mức-file cũ). Liveness suy bởi harness/scripts/decision-liveness.py. ──
  - id: stop-debounce
    name: "stop-debounce (_debounced/require_ok)"
    kind: hook
    surface: [mechanism]
    desc: "Stop hook debounce theo thời gian (mặc định 180s) cho 2 bước nặng nhất (build-wiki-graph 49s + medic --ci 26s) — p-45: cổng kích hoạt lỏng nên chúng fire gần mọi lượt dev framework, 75-90s thuế mỗi lần dừng. require_ok=True (dùng cho gate medic) chỉ bỏ qua nếu lần trước ĐÃ healthy — một FAIL luôn chạy lại ngay, debounce không bao giờ giấu regression thật."
    live_probe: llmwiki/.claude/hooks/stop.py
    anchor_symbol: "setup::llmwiki/.claude/hooks/stop.py::_debounced"
    confirmed: "2026-07-21"

  - id: code-graph-probe-boundary
    name: "code-graph probe boundary (thăm dò thay vì kiểm tồn tại)"
    kind: tool
    surface: [mechanism]
    desc: "Quyết định 2026-07-20: quảng cáo một dependency ngoài (code-graph) phải THĂM DÒ nó (schema DB, tiến trình server, code server có mới không) — không chỉ kiểm file .is_file(). Neo vào adapter trong repo (dep-health.py), không trỏ thẳng ra graph-kit ngoài repo vì graph-kit không index được (KÉO NGOÀI không version hoá theo pin)."
    live_probe: harness/scripts/dep-health.py
    anchor_symbol: "setup::harness/scripts/dep-health.py::probe_code_graph"
    confirmed: "2026-07-21"
