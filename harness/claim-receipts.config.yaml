# harness/claim-receipts.config.yaml
# THE single place the ClaimReceipts unknowns live — the /build-now-adapt-later quarantine.
# claim-receipts.py reads its resolver + claim taxonomy + strictness FROM HERE. Trend mirrored
# (2026): "Tool Receipts, not zero-knowledge proofs" + CiteAudit — agents fabricate tool results
# and cite files/APIs that do not exist; classify each claim by epistemic source and VERIFY the
# references resolve. Pairs with failure-flywheel's "hallucination" class as a live gate.
#
# Extracting references from text and checking they resolve on disk is deterministic and built
# now (--self-test). A richer resolver (the code graph) and the full claim taxonomy are the unknowns.

verified: false                   # ASSUMPTION (not verified) — resolver is plain filesystem (no code-graph symbol resolution); strictness stays 'advisory' so a missed reference never blocks a real change.

resolver: filesystem              # ASSUMPTION (not verified) — filesystem now; 'code-graph' (symbol-aware) is the absent richer adapter
strictness: advisory              # ASSUMPTION (not verified) — advisory (warn, exit 0) until resolver is symbol-aware; then 'strict'

# Epistemic-source buckets for a claim (Tool Receipts). Used to label, not yet to gate.
claim_taxonomy:                   # ASSUMPTION (not verified) — starter taxonomy; refine with real audits
  - tool-output                   #   came from a real tool result
  - inference                     #   derived, not directly observed
  - external-testimony            #   cited a source
  - absence                       #   "no X found"
  - ungrounded-opinion            #   asserted without basis
  - observed-metric               #   a NUMBER about the user/world the agent claims to have measured

# File extensions treated as resolvable references (conservative — avoids flagging prose words).
ref_extensions: [py, md, yaml, yml, json, sh, js, ts, html, txt, toml, cfg]   # ASSUMPTION (not verified)

# observed-metric guard — "cấm bịa số của NGƯỜI HỌC/thế-giới agent không đo được" (distill 2026-07-11).
# A number stated ABOUT a subject, with a metric-noun nearby but NO source marker, is a candidate
# FABRICATION (e.g. "the learner's confidence is 87%" with no "the learner said…"). Heuristic + advisory:
# the subject+metric-noun gate keeps precision up; still misses paraphrase / can false-positive → never
# blocks until strictness:strict + verified:true. Tune these lists against real audits.
metric_subjects: [user, "người dùng", "người học", learner, "the learner", customer, "họ\\b", their, "the human"]
metric_sources:  [said, stated, reported, self-report, khai, "nói", "theo\\b", measured, "đo\\b", observed,
                  "from input", "tool result", "confidence:", rated, answered]
metric_nouns:    [confidence, score, "điểm", "tỉ lệ", "tỷ lệ", rate, "độ tự tin", calibration, accuracy,
                  mastery, "nắm", retention, satisfaction, engagement]
metric_window: 60                 # chars of context around a number scanned for subject/source/noun

# ADAPT-CHECKLIST (finalize when a symbol-aware resolver exists):
#   1. Set resolver: code-graph + wire it (verify cited SYMBOLS/APIs, not just file paths).
#   2. Refine claim_taxonomy + ref_extensions against real hallucination audits.
#   3. Run: python3 harness/scripts/claim-receipts.py --self-test  (must PASS).
#   4. Flip strictness: strict AND verified: true. Only then does an unresolved reference block.
