# council.personas.yaml — thư viện LENS "vĩ nhân" cho council (build-now-adapt-later: CONTRACT).
#
# Đây là lớp ADDITIVE, TẤT ĐỊNH: persona chỉ là góc-nhìn nhét vào prompt Stage-1 của một seat.
# Engine harness/scripts/council.py KHÔNG đổi (anonymize + mean-rank giữ nguyên). Việc "model nào
# fill seat" vẫn là UNKNOWN đã quarantine ở harness/council.config.yaml (verified flag) — KHÔNG ở đây.
#
# Nguồn 18 persona + cặp đối-trọng: github.com/0xNyk/council-of-high-intelligence (attribution).
# council.py roster --case <tag> [--size 3|5] tra bảng này (thuần code, log vào transcript).

personas:
  aristotle:   { name: "Aristotle",        lens: "Phân loại & cấu trúc",            sig: "Cái này thuộc phạm trù nào, cấu trúc ra sao?" }
  socrates:    { name: "Socrates",         lens: "Phá giả định",                    sig: "Tiền đề này có CHẮC đúng không — hỏi trước khi đi tiếp." }
  suntzu:      { name: "Sun Tzu",          lens: "Chiến lược đối kháng",            sig: "Đọc địa hình & đối thủ trước khi đánh." }
  ada:         { name: "Ada Lovelace",     lens: "Hệ hình thức & trừu tượng",       sig: "Cái gì cơ-giới-hoá được, cái gì không?" }
  aurelius:    { name: "Marcus Aurelius",  lens: "Bền bỉ & minh định đạo đức",      sig: "Cái gì trong tầm kiểm soát, cái gì phải chấp nhận?" }
  machiavelli: { name: "Machiavelli",      lens: "Quyền lực & realpolitik",         sig: "Các bên THỰC SỰ hành xử thế nào (không phải nên thế nào)?" }
  laozi:       { name: "Lão Tử",           lens: "Vô vi & để tự nhiên nảy",         sig: "Khi nào LÀM ÍT đi lại tốt hơn?" }
  feynman:     { name: "Feynman",          lens: "Gỡ lỗi từ nguyên lý đầu",         sig: "Từ chối phức tạp không giải thích nổi — giải thích như cho người ngoài." }
  linus:       { name: "Linus Torvalds",   lens: "Kỹ thuật thực dụng",              sig: "Ship được hay im đi — code thật chạy không?" }
  musashi:     { name: "Miyamoto Musashi", lens: "Thời điểm quyết định",            sig: "Đòn dứt khoát đúng lúc, không thừa." }
  watts:       { name: "Alan Watts",       lens: "Đổi khung & góc nhìn",            sig: "Đây có phải vấn đề THẬT, hay khung sai làm nó thành vấn đề?" }
  karpathy:    { name: "Andrej Karpathy",  lens: "Trực giác mạng nơ-ron",           sig: "Model học/hỏng theo cách nào trên thực nghiệm?" }
  ilya:        { name: "Ilya Sutskever",   lens: "Biên giới scaling & an toàn AI",  sig: "Khi nào năng lực trở thành rủi ro?" }
  kahneman:    { name: "Daniel Kahneman",  lens: "Thiên kiến nhận thức",            sig: "Chính suy nghĩ của ta là lỗi đầu tiên — bias nào đang chi phối?" }
  meadows:     { name: "Donella Meadows",  lens: "Tư duy hệ thống & vòng phản hồi", sig: "Sửa HỆ THỐNG, đừng sửa triệu chứng." }
  munger:      { name: "Charlie Munger",   lens: "Đa mô hình & nghịch đảo",         sig: "Cái gì ĐẢM BẢO thất bại? (invert, rồi tránh)." }
  taleb:       { name: "Nassim Taleb",     lens: "Phản mong manh & rủi ro đuôi",    sig: "Thiết kế cho cái ĐUÔI, không phải trung bình." }
  rams:        { name: "Dieter Rams",      lens: "Thiết kế lấy người dùng",         sig: "Ít hơn, nhưng tốt hơn — người dùng quyết." }

# 13 cặp đối-trọng (counterweight) — bốc roster phải có ≥1 cặp để KHÔNG thành phòng vọng âm.
polarity_pairs:
  - [rams, ada]            # tối-giản ↔ hệ-hình-thức
  - [machiavelli, aurelius]# quyền-lực ↔ đạo-đức
  - [feynman, linus]       # nguyên-lý-đầu ↔ ship-it
  - [taleb, ilya]          # rủi-ro-đuôi ↔ rủi-ro-năng-lực
  - [watts, kahneman]      # đổi-khung ↔ kỷ-luật-bias
  - [munger, kahneman]     # nghịch-đảo ↔ bias
  - [laozi, linus]         # vô-vi ↔ ship-it
  - [suntzu, laozi]        # chiến-lược ↔ vô-vi
  - [karpathy, ilya]       # thực-nghiệm ↔ scaling-risk
  - [socrates, machiavelli]# hỏi-tiền-đề ↔ realpolitik
  - [musashi, aurelius]    # đòn-dứt-khoát ↔ chấp-nhận
  - [meadows, linus]       # sửa-hệ-thống ↔ sửa-local
  - [aristotle, watts]     # phân-loại ↔ hoà-tan

# case → roster. base = 3 (lẻ, mean-rank không hoà); extra = +2 khi --size 5. base đã cài 1 cặp đối-trọng.
cases:
  design:    { base: [rams, ada, linus],          extra: [taleb, laozi] }
  strategy:  { base: [suntzu, machiavelli, aurelius], extra: [munger, taleb] }
  debug:     { base: [feynman, linus, kahneman],  extra: [ada, socrates] }
  risk:      { base: [taleb, ilya, munger],       extra: [kahneman, aurelius] }
  product:   { base: [rams, watts, kahneman],     extra: [munger, socrates] }
  decision:  { base: [munger, kahneman, taleb],   extra: [aurelius, socrates] }
  simplify:  { base: [laozi, linus, rams],        extra: [feynman, watts] }
  ml-ai:     { base: [karpathy, ilya, feynman],   extra: [taleb, ada] }

profiles:
  classic:     [aristotle, socrates, suntzu, ada, aurelius, machiavelli, laozi, feynman, linus, musashi, watts, karpathy, ilya, kahneman, meadows, munger, taleb, rams]
  exploration: [socrates, watts, taleb, laozi, munger, kahneman, meadows, aristotle, ada, feynman, ilya, machiavelli]
  lean:        [feynman, linus, kahneman, taleb, rams]
